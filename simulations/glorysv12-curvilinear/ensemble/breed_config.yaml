# Bred vector ensemble configuration
breeding:
  n_members: 50
  n_cycles: 8
  cycle_length_days: 30
  target_amplitude:
    temperature_rms: 0.05  # °C — rescaling factor derived from T, applied to all fields

# Model grid
grid:
  Nx: 768
  Ny: 424
  Nr: 50

# Control run directory (relative to ensemble/)
# Must contain a pickup at iteration 7200 (30 days from nIter0=0)
control:
  run_dir: "../test-run-03252026"

# MITgcm run parameters for each breeding member
member_run:
  deltaT: 360.0
  # nTimeSteps = cycle_length_days * 86400 / deltaT
  # 30 * 86400 / 360 = 7200
  nTimeSteps: 7200

# Output directories
paths:
  member_prefix: "member"
